<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps - Dynamic Fleet</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-sm text-gray-700 select-none">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
            <h1 class="text-3xl font-extrabold text-indigo-600 text-center mb-6">TransitOps 🔐</h1>
            <form onsubmit="handleAuth(event)" class="space-y-4">
                <input type="text" id="authUsername" required placeholder="Username" class="w-full px-4 py-2 border rounded-xl">
                <input type="password" id="authPassword" required placeholder="Password" class="w-full px-4 py-2 border rounded-xl">
                <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl">Authenticate</button>
            </form>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        <div class="w-64 bg-slate-900 text-white p-6 hidden md:flex flex-col justify-between">
            <nav class="space-y-2" id="sidebarMenu">
                <h1 class="text-2xl font-bold tracking-wider mb-6 text-indigo-400">TransitOps</h1>
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="w-full text-left py-2.5 px-4 rounded bg-indigo-600 font-semibold">Dashboard</button>
                <button onclick="switchTab('vehicles')" id="btn-vehicles" class="w-full text-left py-2.5 px-4 rounded text-gray-300 hover:bg-slate-800">Vehicles</button>
                <button onclick="switchTab('drivers')" id="btn-drivers" class="w-full text-left py-2.5 px-4 rounded text-gray-300 hover:bg-slate-800">Drivers</button>
                <button onclick="switchTab('trips')" id="btn-trips" class="w-full text-left py-2.5 px-4 rounded text-gray-300 hover:bg-slate-800">Trips</button>
                <button onclick="switchTab('comms')" id="btn-comms" class="w-full text-left py-2.5 px-4 rounded text-gray-300 hover:bg-slate-800">Comms Hub 💬</button>
            </nav>
            <button onclick="triggerLogout()" class="w-full bg-slate-800 py-2 rounded text-xs">Logout</button>
        </div>

        <div class="flex-1 flex flex-col h-full overflow-hidden">
            <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800" id="currentTabTitle">Dashboard Module</h2>
                <span id="roleBadge" class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-xs font-bold">Manager Mode</span>
            </header>

            <div class="flex-1 overflow-y-auto p-8" id="viewContainer">
                
                <div id="view-dashboard" class="tab-view space-y-6">
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-xs">
                            <div class="text-xs font-semibold text-gray-400">TOTAL VEHICLES</div>
                            <div class="text-2xl font-bold mt-1" id="kpi-vehicles">0</div>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-xs">
                            <div class="text-xs font-semibold text-gray-400">TOTAL DRIVERS</div>
                            <div class="text-2xl font-bold mt-1" id="kpi-drivers">0</div>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-xs">
                            <div class="text-xs font-semibold text-gray-400">ACTIVE TRIPS</div>
                            <div class="text-2xl font-bold mt-1" id="kpi-trips">0</div>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-xs">
                            <div class="text-xs font-semibold text-gray-400">NETWORK CACHE</div>
                            <div class="text-2xl font-bold text-emerald-600 mt-1">OPTIMIZED</div>
                        </div>
                    </div>
                </div>

                <div id="view-vehicles" class="tab-view hidden space-y-4">
                    <div class="bg-white rounded-xl border overflow-hidden">
                        <table class="w-full text-left"><thead class="bg-gray-50 text-xs"><tr><th class="px-6 py-3">Reg</th><th class="px-6 py-3">Model</th><th class="px-6 py-3">Status</th></tr></thead><tbody id="vehicleTableBody" class="divide-y"></tbody></table>
                    </div>
                </div>

                <div id="view-drivers" class="tab-view hidden space-y-4">
                    <div class="bg-white rounded-xl border overflow-hidden">
                        <table class="w-full text-left"><thead class="bg-gray-50 text-xs"><tr><th class="px-6 py-3">Name</th><th class="px-6 py-3">Score</th><th class="px-6 py-3">Status</th></tr></thead><tbody id="driverTableBody" class="divide-y"></tbody></table>
                    </div>
                </div>

                <div id="view-trips" class="tab-view hidden space-y-4">
                    <div class="bg-white rounded-xl border overflow-hidden">
                        <table class="w-full text-left"><thead class="bg-gray-50 text-xs"><tr><th class="px-6 py-3">Route</th><th class="px-6 py-3">Vehicle</th><th class="px-6 py-3">Driver</th><th class="px-6 py-3">Stage</th></tr></thead><tbody id="tripTableBody" class="divide-y"></tbody></table>
                    </div>
                </div>

                <div id="view-comms" class="tab-view hidden space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-xl border space-y-4">
                            <h3 class="text-base font-bold">Transmit Dispatch Alert</h3>
                            <form onsubmit="sendDriverAlert(event)" class="space-y-3">
                                <select id="commDriverSelect" required class="w-full px-3 py-2 border rounded-lg bg-white text-xs"></select>
                                <textarea id="commMessage" required placeholder="Type emergency broadcast..." class="w-full px-3 py-2 border rounded-lg text-xs h-24"></textarea>
                                <button type="submit" class="w-full bg-indigo-600 text-white font-medium py-2 rounded-lg text-xs">Transmit Alert</button>
                            </form>
                        </div>
                        <div class="bg-white p-6 rounded-xl border md:col-span-2">
                            <h3 class="text-base font-bold mb-4">Live Database Transmission Logs</h3>
                            <div class="border rounded-xl p-4 bg-slate-950 text-emerald-400 font-mono text-xs h-64 overflow-y-auto space-y-2" id="alertLiveLogs"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:5000/api";
        let sessionActive = sessionStorage.getItem('__secure_token') ? true : false;
        
        // OPTIMIZATION CACHE SYSTEM: Holds data locally to prevent redundant API thrashing
        let localStateCache = null; 

        function handleAuth(e) {
            e.preventDefault();
            sessionActive = true;
            sessionStorage.setItem('__secure_token', 'TOKEN_' + Date.now());
            document.getElementById('loginOverlay').classList.add('hidden');
            fetchOptimizeState(true); // Force API pull on login
        }

        function triggerLogout() {
            sessionStorage.clear();
            sessionActive = false;
            document.getElementById('loginOverlay').classList.remove('hidden');
        }

        function switchTab(tabId) {
            if(!sessionActive) return;
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            
            document.querySelectorAll('#sidebarMenu button').forEach(el => el.classList.remove('bg-indigo-600', 'text-white'));
            document.getElementById(`btn-${tabId}`).classList.add('bg-indigo-600', 'text-white');
            
            document.getElementById('currentTabTitle').innerText = tabId.charAt(0).toUpperCase() + tabId.slice(1) + " Module";
            
            // OPTIMIZED ACTION: Read from local state memory instead of spamming server
            if (localStateCache) {
                renderUIFromCache();
            } else {
                fetchOptimizeState();
            }
        }

        async function fetchOptimizeState(force = false) {
            if(!sessionActive) return;
            // If cache exists and no force parameter is passed, bypass database hit
            if(localStateCache && !force) {
                renderUIFromCache();
                return;
            }
            try {
                const response = await fetch(`${API_URL}/dashboard`);
                localStateCache = await response.json(); // Data cached into state memory
                renderUIFromCache();
            } catch (err) {
                console.error("Backend Server Unreachable.", err);
            }
        }

        function renderUIFromCache() {
            if(!localStateCache) return;
            
            // 1. Render Dashboard Metrics
            document.getElementById('kpi-vehicles').innerText = localStateCache.vehicles.length;
            document.getElementById('kpi-drivers').innerText = localStateCache.drivers.length;
            document.getElementById('kpi-trips').innerText = localStateCache.trips.length;

            // 2. Render Vehicles Dynamic Grid
            const vBody = document.getElementById('vehicleTableBody');
            vBody.innerHTML = '';
            localStateCache.vehicles.forEach(v => {
                vBody.innerHTML += `<tr class="hover:bg-gray-50"><td class="px-6 py-4 font-semibold">${v.reg}</td><td class="px-6 py-4">${v.model}</td><td class="px-6 py-4"><span class="px-2 py-0.5 rounded text-xs bg-emerald-100 text-emerald-800">${v.status}</span></td></tr>`;
            });

            // 3. Render Drivers Dynamic Grid
            const dBody = document.getElementById('driverTableBody');
            dBody.innerHTML = '';
            localStateCache.drivers.forEach(d => {
                dBody.innerHTML += `<tr class="hover:bg-gray-50"><td class="px-6 py-4 font-medium">${d.name}</td><td class="px-6 py-4 text-indigo-600 font-bold">${d.score}/100</td><td class="px-6 py-4"><span class="px-2 py-0.5 rounded text-xs bg-blue-100 text-blue-800">${d.status}</span></td></tr>`;
            });

            // 4. Render Trips Dynamic Grid
            const tBody = document.getElementById('tripTableBody');
            tBody.innerHTML = '';
            localStateCache.trips.forEach(t => {
                tBody.innerHTML += `<tr class="hover:bg-gray-50"><td class="px-6 py-4">${t.source} &rarr; ${t.dest}</td><td class="px-6 py-4 font-mono text-xs">${t.vehicle}</td><td class="px-6 py-4">${t.driver}</td><td class="px-6 py-4 text-indigo-600 font-bold">${t.stage}</td></tr>`;
            });

            // 5. Render Communication Components
            const select = document.getElementById('commDriverSelect');
            if(select && select.innerHTML === '') {
                localStateCache.drivers.forEach(d => { select.innerHTML += `<option value="${d.license}">${d.name}</option>`; });
            }
            
            const logs = document.getElementById('alertLiveLogs');
            if(logs) {
                logs.innerHTML = '';
                localStateCache.alerts.forEach(a => {
                    logs.innerHTML += `<div>[${a.timestamp}] Target [${a.driver_lic}] &rarr; <span class="text-white">${a.message}</span></div>`;
                });
            }
        }

        async function sendDriverAlert(e) {
            e.preventDefault();
            const lic = document.getElementById('commDriverSelect').value;
            const msg = document.getElementById('commMessage').value.trim();

            try {
                const res = await fetch(`${API_URL}/driver/contact`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ driver_lic: lic, message: msg })
                });
                const result = await res.json();
                document.getElementById('commMessage').value = '';
                fetchOptimizeState(true); // Force state reload to invalidate cache and refresh UI log
            } catch (err) {
                alert("Database synchronization failed.");
            }
        }

        window.onload = function() {
            if (sessionActive) {
                document.getElementById('loginOverlay').classList.add('hidden');
                fetchOptimizeState(true);
            } else {
                triggerLogout();
            }
        }
    </script>
</body>
</html>
